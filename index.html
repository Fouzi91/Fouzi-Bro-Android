<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chercheur de prix</title>
<style>
  :root {
    --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --card: white;
    --text: #111;
    --text2: #aaa;
    --border: #f0f0f0;
    --input-bg: #fafafa;
    --suggestion-hover: #f5f0ff;
  }
  .dark {
    --bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    --card: #1e1e2e;
    --text: #eee;
    --text2: #666;
    --border: #333;
    --input-bg: #2a2a3e;
    --suggestion-hover: #2a2a4e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); min-height: 100vh; padding: 2rem 1rem; transition: all 0.3s; }
  .app { max-width: 420px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; position: relative; }
  .logo { font-size: 40px; margin-bottom: 8px; }
  h1 { font-size: 26px; font-weight: 700; color: white; margin-bottom: 4px; }
  .sub { font-size: 14px; color: rgba(255,255,255,0.75); }
  .dark-toggle { position: absolute; top: 0; right: 0; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; color: white; }
  .card { background: var(--card); border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
  .search-wrap { position: relative; }
  input[type=text] { width: 100%; padding: 14px 14px 14px 44px; font-size: 15px; border: 2px solid var(--border); border-radius: 14px; background: var(--input-bg); color: var(--text); transition: border 0.2s; }
  input[type=text]:focus { outline: none; border-color: #667eea; background: var(--card); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; }
  .suggestions { background: var(--card); border: 2px solid #667eea; border-radius: 14px; margin-top: 6px; overflow: hidden; display: none; max-height: 300px; overflow-y: auto; }
  .suggestion-item { padding: 12px 16px; font-size: 14px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--suggestion-hover); }
  .suggestion-name { flex: 1; }
  .suggestion-price { font-size: 11px; color: #667eea; font-weight: 600; white-space: nowrap; }
  .suggestion-date { font-size: 10px; color: var(--text2); }
  .history-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px; }
  .divider { text-align: center; font-size: 12px; color: var(--text2); margin: 1rem 0; font-weight: 600; letter-spacing: 1px; }
  .sites { display: flex; flex-direction: column; gap: 10px; }
  .btn { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-radius: 16px; border: none; cursor: pointer; width: 100%; transition: transform 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn.vinted { background: linear-gradient(135deg, #09B1BA, #06d6a0); }
  .btn.lbc { background: linear-gradient(135deg, #FF6E14, #ff9a44); }
  .btn.both { background: linear-gradient(135deg, #667eea, #764ba2); }
  .btn-label { font-size: 15px; font-weight: 700; color: white; text-align: left; }
  .btn-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .arrow { font-size: 20px; color: rgba(255,255,255,0.7); }
  .price-row { display: flex; gap: 10px; margin-top: 1rem; }
  .price-input { flex: 1; padding: 12px 14px; font-size: 15px; border: 2px solid var(--border); border-radius: 14px; background: var(--input-bg); color: var(--text); }
  .price-input:focus { outline: none; border-color: #667eea; }
  .save-btn { padding: 12px 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .online-prices { margin-top: 1rem; }
  .price-entry { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .price-entry:last-child { border-bottom: none; }
  .price-entry-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
  .price-entry-meta { font-size: 11px; color: var(--text2); }
  .price-entry-price { color: #667eea; font-weight: 700; font-size: 15px; }
  .empty-msg { font-size: 13px; color: var(--text2); text-align: center; padding: 1rem 0; }
  .status { font-size: 12px; color: var(--text2); text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🎮</div>
    <h1>Chercheur de prix</h1>
    <p class="sub">Jeux vidéos & brocante</p>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">🌙</button>
  </div>

  <div class="card">
    <div class="card-title">Rechercher les prix</div>
    <div class="search-wrap">
      <span class="search-icon">🎮</span>
      <input type="text" id="q" placeholder="Ex: Pokemon Rouge, PS2..." autocomplete="off" oninput="showSuggestions()" onfocus="showSuggestions()" />
    </div>
    <div class="suggestions" id="suggestions"></div>
    <div class="divider">— CHERCHER SUR —</div>
    <div class="sites">
      <button class="btn vinted" onclick="go('vinted')">
        <div><div class="btn-label">Vinted</div><div class="btn-sub">Prix entre particuliers</div></div>
        <span class="arrow">→</span>
      </button>
      <button class="btn lbc" onclick="go('lbc')">
        <div><div class="btn-label">Leboncoin</div><div class="btn-sub">Annonces locales</div></div>
        <span class="arrow">→</span>
      </button>
      <button class="btn both" onclick="go('both')">
        <div><div class="btn-label">Les deux en même temps</div><div class="btn-sub">Vinted + Leboncoin</div></div>
        <span class="arrow">⚡</span>
      </button>
    </div>
    <div class="price-row">
      <input type="number" class="price-input" id="found-price" placeholder="Prix trouvé (€)" />
      <button class="save-btn" onclick="savePrice()">💾 Sauvegarder</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <div class="card-title">💰 Prix partagés</div>
    <div class="online-prices" id="online-prices">
      <div class="empty-msg">Chargement...</div>
    </div>
  </div>
</div>

<script>
var DB_URL = 'https://fouzi-hichem-default-rtdb.firebaseio.com';
var onlinePrices = [];

var predefined = [
  "Nintendo NES","Super Nintendo SNES","Mega Drive Sega","Game Boy","Game Boy Color","Game Boy Advance",
  "Nintendo 64","GameCube","Nintendo DS","Nintendo 3DS","Nintendo Switch",
  "PlayStation 1 PS1","PlayStation 2 PS2","PlayStation 3 PS3","PlayStation 4 PS4","PlayStation 5 PS5","PSP","PS Vita",
  "Xbox","Xbox 360","Xbox One","Xbox Series X",
  "Final Fantasy VII PS1","Final Fantasy VIII PS1","Final Fantasy IX PS1","Chrono Cross PS1",
  "Metal Gear Solid PS1","Resident Evil PS1","Resident Evil 2 PS1","Silent Hill PS1",
  "Crash Bandicoot PS1","Crash Bandicoot 2 PS1","Crash Bandicoot 3 Warped PS1",
  "Spyro the Dragon PS1","Tekken PS1","Tekken 2 PS1","Tekken 3 PS1",
  "Gran Turismo PS1","Gran Turismo 2 PS1",
  "GTA San Andreas PS2","GTA Vice City PS2","God of War PS2","Shadow of the Colossus PS2",
  "Kingdom Hearts PS2","Kingdom Hearts II PS2","Final Fantasy X PS2","Persona 4 PS2",
  "Devil May Cry PS2","Resident Evil 4 PS2","Metal Gear Solid 3 PS2",
  "The Last of Us PS3","God of War III PS3","GTA V PS3","Dark Souls PS3",
  "God of War PS4","Spider-Man PS4","Elden Ring PS4","Bloodborne PS4","Red Dead Redemption 2 PS4",
  "Spider-Man 2 PS5","God of War Ragnarok PS5","Elden Ring PS5","Astro Bot PS5",
  "Mario Kart 8 Deluxe Switch","Zelda Breath of the Wild Switch","Zelda Tears of the Kingdom Switch",
  "Super Mario Odyssey Switch","Animal Crossing New Horizons Switch","Super Smash Bros Ultimate Switch",
  "Super Mario Sunshine GameCube","Metroid Prime GameCube",
  "Super Mario World SNES","Chrono Trigger SNES","Secret of Mana SNES",
  "Sonic the Hedgehog Mega Drive","Streets of Rage 2 Mega Drive",
  "Tetris Game Boy","Pokemon Rouge Game Boy","Pokemon Bleu Game Boy",
  "Pokemon Or GBC","Pokemon Argent GBC","Pokemon Cristal GBC",
  "Pokemon Rubis GBA","Pokemon Emeraude GBA","Golden Sun GBA","Advance Wars GBA",
  "Manette PS4 DualShock","Manette PS5 DualSense","Manette Switch Pro","Manette GameCube"
];

function toggleDark() {
  document.body.classList.toggle('dark');
  document.getElementById('darkBtn').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem('jv_history') || '[]'); } catch(e) { return []; }
}
function saveHistory(q) {
  try {
    var h = getHistory().filter(function(x){ return x !== q; });
    h.unshift(q);
    localStorage.setItem('jv_history', JSON.stringify(h.slice(0, 8)));
  } catch(e) {}
}
function showSuggestions() {
  var q = document.getElementById('q').value.trim().toLowerCase();
  var box = document.getElementById('suggestions');
  var html = '';
  var history = getHistory();

  if (q === '') {
    if (onlinePrices.length > 0) {
      html += '<div class="history-label">💰 Prix partagés</div>';
      onlinePrices.slice(0, 4).forEach(function(p) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.name.replace(/'/g,"\\'") + '\')">' +
          '<span>💰</span>' +
          '<div class="suggestion-name">' + p.name + '<div class="suggestion-date">' + p.date + '</div></div>' +
          '<span class="suggestion-price">' + p.price + '€</span>' +
          '</div>';
      });
    }
    if (history.length > 0) {
      html += '<div class="history-label">🕐 Récents</div>';
      history.slice(0, 3).forEach(function(h) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + h.replace(/'/g,"\\'") + '\')"><span>🕐</span><div class="suggestion-name">' + h + '</div></div>';
      });
    }
    html += '<div class="history-label">🎮 Populaires</div>';
    predefined.slice(0, 5).forEach(function(p) {
      html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.replace(/'/g,"\\'") + '\')"><span>🎮</span><div class="suggestion-name">' + p + '</div></div>';
    });
  } else {
    var pFiltered = onlinePrices.filter(function(p){ return p.name.toLowerCase().indexOf(q) > -1; });
    if (pFiltered.length > 0) {
      html += '<div class="history-label">💰 Prix partagés</div>';
      pFiltered.slice(0, 3).forEach(function(p) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.name.replace(/'/g,"\\'") + '\')">' +
          '<span>💰</span>' +
          '<div class="suggestion-name">' + p.name + '<div class="suggestion-date">' + p.date + '</div></div>' +
          '<span class="suggestion-price">' + p.price + '€</span>' +
          '</div>';
      });
    }
    var filtered = predefined.filter(function(p){ return p.toLowerCase().indexOf(q) > -1; });
    var hFiltered = history.filter(function(h){ return h.toLowerCase().indexOf(q) > -1; });
    if (hFiltered.length > 0) {
      html += '<div class="history-label">🕐 Récents</div>';
      hFiltered.slice(0,3).forEach(function(h) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + h.replace(/'/g,"\\'") + '\')"><span>🕐</span><div class="suggestion-name">' + h + '</div></div>';
      });
    }
    filtered.slice(0, 6).forEach(function(p) {
      html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.replace(/'/g,"\\'") + '\')"><span>🎮</span><div class="suggestion-name">' + p + '</div></div>';
    });
  }
  if (html === '') { box.style.display = 'none'; return; }
  box.innerHTML = html;
  box.style.display = 'block';
}
function selectSuggestion(val) {
  document.getElementById('q').value = val;
  document.getElementById('suggestions').style.display = 'none';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.suggestions')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});
function go(site) {
  var q = document.getElementById('q').value.trim();
  if (!q) { alert("Entre un nom de jeu d'abord !"); return; }
  saveHistory(q);
  document.getElementById('suggestions').style.display = 'none';
  if (site === 'vinted' || site === 'both') window.open('https://www.vinted.fr/catalog?search_text=' + encodeURIComponent(q), '_blank');
  if (site === 'lbc' || site === 'both') setTimeout(function(){ window.open('https://www.leboncoin.fr/recherche?text=' + encodeURIComponent(q), '_blank'); }, 400);
}
function savePrice() {
  var q = document.getElementById('q').value.trim();
  var price = document.getElementById('found-price').value.trim();
  if (!q) { alert("Entre un nom de jeu d'abord !"); return; }
  if (!price) { alert("Entre un prix !"); return; }
  var status = document.getElementById('status');
  status.textContent = 'Sauvegarde en cours...';
  var data = { name: q, price: parseFloat(price), date: new Date().toLocaleDateString('fr-FR') };
  fetch(DB_URL + '/prices.json', {
    method: 'POST',
    body: JSON.stringify(data)
  }).then(function() {
    document.getElementById('found-price').value = '';
    status.textContent = '✅ Prix sauvegardé !';
    setTimeout(function(){ status.textContent = ''; }, 2000);
    loadPrices();
  }).catch(function() {
    status.textContent = '❌ Erreur de connexion';
  });
}
function loadPrices() {
  fetch(DB_URL + '/prices.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var box = document.getElementById('online-prices');
      if (!data) { box.innerHTML = '<div class="empty-msg">Aucun prix partagé</div>'; return; }
      onlinePrices = [];
      Object.values(data).forEach(function(p) { onlinePrices.push(p); });
      onlinePrices.sort(function(a,b){ return b.date > a.date ? 1 : -1; });
      box.innerHTML = onlinePrices.slice(0, 20).map(function(p) {
        return '<div class="price-entry">' +
          '<div><div class="price-entry-name">' + p.name + '</div><div class="price-entry-meta">' + p.date + '</div></div>' +
          '<span class="price-entry-price">' + p.price + '€</span>' +
        '</div>';
      }).join('');
    }).catch(function() {
      document.getElementById('online-prices').innerHTML = '<div class="empty-msg">Erreur de chargement</div>';
    });
}
loadPrices();
</script>
</body>
</html>
