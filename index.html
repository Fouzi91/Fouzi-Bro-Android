<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chercheur de prix brocante</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 420px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .logo { font-size: 40px; margin-bottom: 8px; }
  h1 { font-size: 26px; font-weight: 700; color: white; margin-bottom: 4px; }
  .sub { font-size: 14px; color: rgba(255,255,255,0.75); }
  .card { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
  .card-title { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
  .camera-btns { display: flex; gap: 10px; }
  .cam-btn { flex: 1; padding: 14px 10px; border-radius: 14px; border: none; font-size: 13px; font-weight: 700; color: white; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cam-btn.lens { background: linear-gradient(135deg, #4facfe, #00f2fe); }
  .cam-btn.images { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .cam-icon { font-size: 22px; }
  .cam-sub { font-size: 10px; opacity: 0.85; font-weight: 400; }
  .search-wrap { position: relative; margin-bottom: 0; }
  input { width: 100%; padding: 14px 14px 14px 44px; font-size: 15px; border: 2px solid #f0f0f0; border-radius: 14px; background: #fafafa; color: #111; transition: border 0.2s; }
  input:focus { outline: none; border-color: #667eea; background: white; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; }
  .suggestions { background: white; border: 2px solid #667eea; border-radius: 14px; margin-top: 6px; overflow: hidden; display: none; }
  .suggestion-item { padding: 12px 16px; font-size: 14px; color: #333; cursor: pointer; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 10px; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: #f5f0ff; }
  .suggestion-icon { font-size: 14px; color: #aaa; }
  .history-label { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px; }
  .divider { text-align: center; font-size: 12px; color: #bbb; margin: 1rem 0; font-weight: 600; letter-spacing: 1px; }
  .sites { display: flex; flex-direction: column; gap: 10px; }
  .btn { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-radius: 16px; border: none; cursor: pointer; width: 100%; transition: transform 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn.vinted { background: linear-gradient(135deg, #09B1BA, #06d6a0); }
  .btn.lbc { background: linear-gradient(135deg, #FF6E14, #ff9a44); }
  .btn.both { background: linear-gradient(135deg, #667eea, #764ba2); }
  .btn-left { display: flex; align-items: center; gap: 12px; }
  .btn-label { font-size: 15px; font-weight: 700; color: white; text-align: left; }
  .btn-sub { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .arrow { font-size: 20px; color: rgba(255,255,255,0.7); }
  .tip { background: linear-gradient(135deg, #fff8e1, #fff3cd); border-radius: 16px; padding: 14px 16px; font-size: 13px; color: #856404; line-height: 1.6; border-left: 4px solid #ffc107; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🛍️</div>
    <h1>Chercheur de prix</h1>
    <p class="sub">Pour les brocanteurs malins</p>
  </div>

  <div class="card">
    <div class="card-title">Identifier l'objet</div>
    <div class="camera-btns">
      <button class="cam-btn lens" onclick="window.open('https://lens.google.com','_blank')">
        <span class="cam-icon">🔍</span>
        <span>Google Lens</span>
        <span class="cam-sub">Scanner un objet</span>
      </button>
      <button class="cam-btn images" onclick="window.open('https://images.google.com','_blank')">
        <span class="cam-icon">📷</span>
        <span>Google Images</span>
        <span class="cam-sub">Recherche photo</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Rechercher les prix</div>
    <div class="search-wrap">
      <span class="search-icon">✏️</span>
      <input type="text" id="q" placeholder="Colle le nom de l'objet ici..." autocomplete="off" oninput="showSuggestions()" onfocus="showSuggestions()" />
    </div>
    <div class="suggestions" id="suggestions"></div>
    <div class="divider">— CHERCHER SUR —</div>
    <div class="sites">
      <button class="btn vinted" onclick="go('vinted')">
        <div class="btn-left">
          <div>
            <div class="btn-label">Vinted</div>
            <div class="btn-sub">Prix entre particuliers</div>
          </div>
        </div>
        <span class="arrow">→</span>
      </button>
      <button class="btn lbc" onclick="go('lbc')">
        <div class="btn-left">
          <div>
            <div class="btn-label">Leboncoin</div>
            <div class="btn-sub">Annonces locales</div>
          </div>
        </div>
        <span class="arrow">→</span>
      </button>
      <button class="btn both" onclick="go('both')">
        <div class="btn-left">
          <div>
            <div class="btn-label">Les deux en même temps</div>
            <div class="btn-sub">Vinted + Leboncoin</div>
          </div>
        </div>
        <span class="arrow">⚡</span>
      </button>
    </div>
  </div>

  <div class="tip">💡 <strong>Astuce :</strong> Ouvre Google Lens, pointe l'objet, copie le nom détecté, colle-le ici et recherche !</div>
</div>

<script>
var predefined = [
  "Lampe Jielde","Lampe industrielle","Lampe vintage","Lustre ancien",
  "Chaise Tolix","Chaise bistrot","Fauteuil vintage","Canapé cuir",
  "Table basse vintage","Commode ancienne","Buffet ancien","Armoire ancienne",
  "Tableau ancien","Miroir doré","Horloge ancienne","Pendule ancienne",
  "Service vaisselle","Assiette ancienne","Carafe cristal","Vase Lalique",
  "Montre ancienne","Bijou vintage","Broche ancienne","Collier vintage",
  "Appareil photo vintage","Radio ancienne","Téléphone vintage","Machine à écrire",
  "Livre ancien","Affiche vintage","Carte postale ancienne","Timbre collection",
  "Jouet ancien","Poupée ancienne","Voiture miniature","Figurine porcelaine",
  "Bronze ancien","Statue ancienne","Bougeoir argent","Couverts argent"
];

function getHistory() {
  try { return JSON.parse(localStorage.getItem('brocante_history') || '[]'); } catch(e) { return []; }
}

function saveHistory(q) {
  try {
    var h = getHistory().filter(function(x){ return x !== q; });
    h.unshift(q);
    localStorage.setItem('brocante_history', JSON.stringify(h.slice(0, 8)));
  } catch(e) {}
}

function showSuggestions() {
  var q = document.getElementById('q').value.trim().toLowerCase();
  var box = document.getElementById('suggestions');
  var html = '';
  var history = getHistory();

  if (q === '') {
    if (history.length > 0) {
      html += '<div class="history-label">🕐 Recherches récentes</div>';
      history.slice(0, 4).forEach(function(h) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + h.replace(/'/g,"\'") + '\')"><span class="suggestion-icon">🕐</span>' + h + '</div>';
      });
    }
    var popular = predefined.slice(0, 5);
    html += '<div class="history-label">⭐ Populaires</div>';
    popular.forEach(function(p) {
      html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.replace(/'/g,"\'") + '\')"><span class="suggestion-icon">🏷️</span>' + p + '</div>';
    });
  } else {
    var filtered = predefined.filter(function(p){ return p.toLowerCase().indexOf(q) > -1; });
    var hFiltered = history.filter(function(h){ return h.toLowerCase().indexOf(q) > -1; });
    if (hFiltered.length > 0) {
      html += '<div class="history-label">🕐 Récents</div>';
      hFiltered.slice(0,3).forEach(function(h) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + h.replace(/'/g,"\'") + '\')"><span class="suggestion-icon">🕐</span>' + h + '</div>';
      });
    }
    if (filtered.length > 0) {
      filtered.slice(0, 5).forEach(function(p) {
        html += '<div class="suggestion-item" onclick="selectSuggestion(\'' + p.replace(/'/g,"\'") + '\')"><span class="suggestion-icon">🏷️</span>' + p + '</div>';
      });
    }
  }

  if (html === '') { box.style.display = 'none'; return; }
  box.innerHTML = html;
  box.style.display = 'block';
}

function selectSuggestion(val) {
  document.getElementById('q').value = val;
  document.getElementById('suggestions').style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.suggestions')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});

function go(site) {
  var q = document.getElementById('q').value.trim();
  if (!q) { alert("Entre un nom d'objet d'abord !"); return; }
  saveHistory(q);
  document.getElementById('suggestions').style.display = 'none';
  if (site === 'vinted' || site === 'both') window.open('https://www.vinted.fr/catalog?search_text=' + encodeURIComponent(q), '_blank');
  if (site === 'lbc' || site === 'both') setTimeout(function(){ window.open('https://www.leboncoin.fr/recherche?text=' + encodeURIComponent(q), '_blank'); }, 400);
}
</script>
</body>
</html>
